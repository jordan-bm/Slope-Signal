name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-health:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: slope
          POSTGRES_PASSWORD: signal
          POSTGRES_DB: slopesignal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run Alembic migrations
        working-directory: api
        env:
          DATABASE_URL: postgresql://slope:signal@localhost:5432/slopesignal
        run: alembic upgrade head

      - name: Start API
        env:
          DATABASE_URL: postgresql://slope:signal@localhost:5432/slopesignal
        run: |
          cd api
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Health check
        run: curl -f http://localhost:8000/health

      - name: Check regions endpoint
        run: curl -f http://localhost:8000/api/regions