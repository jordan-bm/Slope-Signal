name: Daily Ingest
on:
  schedule:
    - cron: "0 14 * * *"  # 7am MT = 14:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Run ingest on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 18.116.85.134
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/Slope-Signal
            git pull origin main
            docker-compose exec api python ingest/jobs/uac.py